<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Phoenix Live</title>
  <style>
    /* ===== Design tokens ===== */
    :root {
      --bg:       #f0f4f8;
      --card:     #ffffff;
      --text:     #0b1f3b;
      --muted:    #6b7280;
      --line:     #e2e8f0;
      --accent:   #0f4c81;
      --live:     #10b981;
      --warn:     #f59e0b;
      --err:      #ef4444;
      --brand-dk: #0b1f3b;
      --brand-md: #0f4c81;
      --brand-lt: #16a6c9;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:    #0f172a;
        --card:  #1e293b;
        --text:  #f1f5f9;
        --muted: #94a3b8;
        --line:  #2d3f55;
      }
    }

    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    #app {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    /* ===== Sticky brand header ===== */
    .brand-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, var(--brand-dk) 0%, var(--brand-md) 100%);
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 56px;
    }
    .brand-left  { flex: 1; min-width: 0; }
    .brand-kicker {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.65;
      margin-bottom: 2px;
    }
    .brand-title {
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand-logo {
      flex-shrink: 0;
      height: 38px;
      max-width: 90px;
      object-fit: contain;
      border-radius: 5px;
      background: rgba(255,255,255,0.12);
      padding: 3px;
    }
    .brand-back {
      flex-shrink: 0;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ===== Tab bars ===== */
    .tab-bar, .sub-bar, .cat-bar {
      background: var(--card);
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 0;
      width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      padding: 0 10px;
    }
    .tab-bar::-webkit-scrollbar,
    .sub-bar::-webkit-scrollbar,
    .cat-bar::-webkit-scrollbar { display: none; }

    .sub-bar, .cat-bar {
      gap: 6px;
      padding: 7px 10px;
      background: #f8fafc;
    }
    @media (prefers-color-scheme: dark) {
      .sub-bar, .cat-bar { background: #162032; }
    }

    .tab-btn {
      flex-shrink: 0;
      padding: 12px 14px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .pill-btn {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
    }
    .pill-btn.active  { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pill-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    /* ===== Results pane ===== */
    .results-pane {
      padding: 12px 12px 72px;
      min-height: 200px;
      width: 100%;
      max-width: 100vw;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
    }

    /* Force readable text colors for injected module HTML */
    .results-pane,
    .results-pane h1,
    .results-pane h2,
    .results-pane h3,
    .results-pane h4,
    .results-pane h5,
    .results-pane h6,
    .results-pane p,
    .results-pane span,
    .results-pane div,
    .results-pane li,
    .results-pane td,
    .results-pane th {
      color: var(--text) !important;
    }

    /* Injected results HTML */
    .results-pane img,
    .results-pane svg,
    .results-pane canvas,
    .results-pane iframe {
      max-width: 100% !important;
      height: auto !important;
    }
    .results-pane table {
      width: max-content;
      min-width: 100%;
      max-width: none;
      border-collapse: collapse;
      font-size: 13px;
      margin: 8px 0;
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }
    .results-pane th, .results-pane td {
      padding: 7px 8px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid rgba(148, 163, 184, 0.35);
      background: transparent !important;
    }
    .results-pane th {
      background: #dbe7f3;
      font-weight: 800;
      font-size: 12px;
      color: #0b1f3b;
      border-top: 1px solid rgba(15, 76, 129, 0.5);
    }
    .results-pane td { font-weight: 600; color: #071427 !important; }
    @media (prefers-color-scheme: dark) {
      .results-pane th {
        background: #324766;
        color: #f8fbff;
        border-top: 1px solid rgba(159, 214, 255, 0.45);
      }
      .results-pane td { color: #f3f8ff !important; }
      .results-pane th, .results-pane td { border-right: 1px solid rgba(159, 214, 255, 0.24); }
    }
    .results-pane tbody tr:nth-child(odd) td { background: rgba(15, 76, 129, 0.08) !important; }
    .results-pane tbody tr:nth-child(even) td { background: rgba(15, 76, 129, 0.02) !important; }
    @media (prefers-color-scheme: dark) {
      .results-pane tbody tr:nth-child(odd) td { background: rgba(15, 76, 129, 0.34) !important; }
      .results-pane tbody tr:nth-child(even) td { background: rgba(8, 22, 46, 0.78) !important; }
      .results-pane h2 { color: #9fd6ff !important; }
      .results-pane h3 { color: #7dc6ff !important; }
    }

    /* Podium row styling: keep for results, disable for Start Lists */
    .results-pane:not([data-pt-view="startlists"]) tr:first-child td { background: #fffbeb !important; font-weight: 700; }
    .results-pane:not([data-pt-view="startlists"]) tr:nth-child(2) td  { background: #f8fafc !important; }
    .results-pane:not([data-pt-view="startlists"]) tr:nth-child(3) td  { background: #fff8f5 !important; }
    @media (prefers-color-scheme: dark) {
      .results-pane:not([data-pt-view="startlists"]) tr:first-child td  { background: #3a3300 !important; }
      .results-pane:not([data-pt-view="startlists"]) tr:nth-child(2) td { background: #24354d !important; }
      .results-pane:not([data-pt-view="startlists"]) tr:nth-child(3) td { background: #33231c !important; }
    }
    .results-pane h2 { font-size: 17px; font-weight: 800; margin: 14px 0 6px; color: var(--brand-dk); }
    .results-pane h3 { font-size: 14px; font-weight: 700; margin: 10px 0 4px; color: var(--brand-md); }

    /* ===== Status bar ===== */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(11, 31, 59, 0.93);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: rgba(255,255,255,0.82);
      font-size: 11px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 200;
    }
    .status-text {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-btn {
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.14);
      color: #fff;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .status-btn.active {
      background: rgba(245, 158, 11, 0.22);
      border-color: rgba(245, 158, 11, 0.72);
      color: #fde68a;
    }
    .status-version {
      flex-shrink: 0;
      font-size: 10px;
      opacity: 0.75;
      letter-spacing: 0.02em;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--warn);
      transition: background 0.3s;
    }
    .status-dot.live  { background: var(--live); animation: sPulse 2.2s infinite; }
    .status-dot.error { background: var(--err);  animation: none; }
    @keyframes sPulse { 0%,100% { opacity:1; } 50% { opacity:.38; } }

    /* ===== Event picker ===== */
    .picker-wrap { padding: 18px 14px 72px; }
    .picker-heading {
      font-size: 22px; font-weight: 800;
      color: var(--brand-dk); margin-bottom: 4px;
    }
    .picker-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
    .event-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: box-shadow 0.12s, transform 0.1s;
    }
    .event-card:active { transform: scale(0.98); opacity: 0.85; }
    .event-card-name { font-size: 16px; font-weight: 700; }
    .event-card-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .live-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #dcfce7;
      color: #166534;
      font-size: 10px;
      font-weight: 700;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ===== State messages ===== */
    .state-wrap { padding: 50px 20px; text-align: center; }
    .state-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .state-desc  { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* ===== Mobile first refinements ===== */
    @media (max-width: 768px) {
      .brand-header { padding: 8px 10px; min-height: 52px; }
      .brand-kicker { font-size: 9px; }
      .brand-title { font-size: 14px; }
      .brand-logo { height: 32px; max-width: 72px; }
      .brand-back { padding: 6px 10px; font-size: 12px; }

      .tab-btn,
      .pill-btn {
        min-height: 34px;
      }

      .tab-btn { padding: 10px 12px; font-size: 12px; }
      .pill-btn { padding: 5px 11px; font-size: 12px; }

      .results-pane {
        padding: 8px 8px 76px;
        font-size: 13px;
      }

      .results-pane table { font-size: 12px; }
      .results-pane th, .results-pane td {
        padding: 7px 8px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.45);
      }
      .results-pane h2 { font-size: 21px; font-weight: 900; }
      .results-pane h3 { font-size: 16px; font-weight: 800; }

      .picker-wrap { padding: 14px 10px 72px; }
      .picker-heading { font-size: 20px; }
      .picker-sub { margin-bottom: 12px; }
      .event-card { padding: 12px; }
      .event-card-name { font-size: 15px; }
    }
  </style>
</head>
<body>

  <div id="app"></div>

  <div class="status-bar">
    <div class="status-dot" id="sDot"></div>
    <span id="sText" class="status-text">Connecting…</span>
    <button id="pauseRefreshBtn" class="status-btn" type="button">Pause</button>
    <span id="viewerVersion" class="status-version"></span>
  </div>

<script>
// =============================================================================
// Config  (reads URL params, falls back to auto-detect)
// =============================================================================
// For mobile-app bundled use, set these values in the file before packaging.
// Leave empty to keep URL-param behavior.
const EMBED_RELAY_URL = '';
const EMBED_EVENT_ID = '';

const _p      = new URLSearchParams(window.location.search);
const RELAY   = (_p.get('relayUrl') || '').trim() || EMBED_RELAY_URL.trim() || autoRelayUrl();
const INIT_ID = (_p.get('eventId') || '').trim() || EMBED_EVENT_ID.trim();
const POLL_MS = 3000;
const STALE_AFTER_MS = 20000;
const VIEWER_VERSION = '2026.03.16-3';

function autoRelayUrl() {
  // If the viewer is hosted alongside relay.php in the same directory, derive the URL.
  return window.location.href.replace(/\/[^\/]*(\?.*)?$/, '/relay.php');
}

// =============================================================================
// State
// =============================================================================
let currentEventId          = INIT_ID;
let currentModule           = null;
let currentPtView           = ls('pv_ptView')    || 'results';
let currentPtSlVariantId    = ls('pv_slVariant') || '';
let currentCategory         = ls('pv_category')  || null;
let lastSnapshotData        = null;
let lastUpdateTime          = null;
let lastDataChangeTime      = null;
let pollTimer               = null;
let statusTimer             = null;
let pickerMode              = !INIT_ID;   // true = showing event picker
let lastRenderedSnapshotHash = '';
let pendingSnapshotForRender = null;
let userIsInteracting = false;
let interactionReleaseTimer = null;
let autoRefreshPaused = false;

// =============================================================================
// Helpers
// =============================================================================
const app  = document.getElementById('app');
const sDot = document.getElementById('sDot');
const sText = document.getElementById('sText');
const pauseRefreshBtn = document.getElementById('pauseRefreshBtn');
const viewerVersion = document.getElementById('viewerVersion');

function ls(k, v)    { try { if (v===undefined) return localStorage.getItem(k); localStorage.setItem(k, v); } catch{} }
function esc(s)      { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function elapsed(ms) { const s=Math.round((Date.now()-ms)/1000); return s<60 ? s+'s' : Math.floor(s/60)+'m'; }

function setStatus(msg, state /* 'live'|'error'|'' */) {
  sText.textContent = msg;
  sDot.className = 'status-dot' + (state ? ' '+state : '');
}

function setAutoRefreshPaused(paused) {
  autoRefreshPaused = !!paused;
  if (pauseRefreshBtn) {
    pauseRefreshBtn.textContent = autoRefreshPaused ? 'Resume' : 'Pause';
    pauseRefreshBtn.classList.toggle('active', autoRefreshPaused);
  }
  if (autoRefreshPaused) {
    setStatus('Paused · tap Resume to continue', '');
  } else if (currentEventId) {
    setStatus('Refreshing…', 'live');
    poll(currentEventId);
  }
}

function hashSnapshot(obj) {
  try { return JSON.stringify(obj); } catch { return String(Date.now()); }
}

function getBarScrollState() {
  return {
    tabBar:   document.getElementById('tabBar')?.scrollLeft   || 0,
    ptSubBar: document.getElementById('ptSubBar')?.scrollLeft || 0,
    slVarBar: document.getElementById('slVarBar')?.scrollLeft || 0,
    catBar:   document.getElementById('catBar')?.scrollLeft   || 0,
  };
}

function getContentScrollState() {
  const pane = document.getElementById('rPane');
  const tableScrolls = Array.from(document.querySelectorAll('#rPane table')).map(t => t.scrollLeft || 0);
  return {
    paneX: pane?.scrollLeft || 0,
    tableScrolls,
  };
}

function restoreBarScrollState(state) {
  if (!state) return;
  const tabBar = document.getElementById('tabBar');
  const ptSubBar = document.getElementById('ptSubBar');
  const slVarBar = document.getElementById('slVarBar');
  const catBar = document.getElementById('catBar');
  if (tabBar) tabBar.scrollLeft = state.tabBar || 0;
  if (ptSubBar) ptSubBar.scrollLeft = state.ptSubBar || 0;
  if (slVarBar) slVarBar.scrollLeft = state.slVarBar || 0;
  if (catBar) catBar.scrollLeft = state.catBar || 0;
}

function restoreContentScrollState(state) {
  if (!state) return;
  const pane = document.getElementById('rPane');
  if (pane) pane.scrollLeft = state.paneX || 0;
  const tables = Array.from(document.querySelectorAll('#rPane table'));
  tables.forEach((t, i) => {
    t.scrollLeft = state.tableScrolls?.[i] || 0;
  });
}

function markInteractionStart() {
  userIsInteracting = true;
  if (interactionReleaseTimer) clearTimeout(interactionReleaseTimer);
}

function markInteractionEnd() {
  if (interactionReleaseTimer) clearTimeout(interactionReleaseTimer);
  interactionReleaseTimer = setTimeout(() => {
    userIsInteracting = false;
    if (pendingSnapshotForRender) {
      const queued = pendingSnapshotForRender;
      pendingSnapshotForRender = null;
      renderLive(queued);
    }
  }, 900);
}

function bindContentInteractionGuards() {
  const pane = document.getElementById('rPane');
  if (!pane) return;
  pane.addEventListener('touchstart', markInteractionStart, { passive: true });
  pane.addEventListener('touchmove', markInteractionStart, { passive: true });
  pane.addEventListener('touchend', markInteractionEnd, { passive: true });
  pane.addEventListener('touchcancel', markInteractionEnd, { passive: true });
  pane.addEventListener('mousedown', markInteractionStart);
  pane.addEventListener('mouseup', markInteractionEnd);
  pane.addEventListener('mouseleave', markInteractionEnd);
}

// =============================================================================
// API
// =============================================================================
async function apiGet(qs) {
  const res = await fetch(`${RELAY}?${qs}`, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// =============================================================================
// Init
// =============================================================================
function init() {
  if (!RELAY) {
    renderMsg('No relay URL', 'Pass ?relayUrl=https://yoursite.com/phoenix-live/relay.php in the URL, or host this file in the same folder as relay.php.');
    setStatus('Not configured', 'error');
    return;
  }

  if (viewerVersion) viewerVersion.textContent = 'v' + VIEWER_VERSION;

  if (pauseRefreshBtn) {
    pauseRefreshBtn.addEventListener('click', () => {
      setAutoRefreshPaused(!autoRefreshPaused);
    });
  }

  currentEventId ? enterEvent(currentEventId) : openPicker();
}

// =============================================================================
// Event Picker
// =============================================================================
function openPicker() {
  clearInterval(pollTimer);
  pickerMode = true;
  setStatus('Loading events…');
  pollPicker();
  pollTimer = setInterval(pollPicker, 6000);
}

async function pollPicker() {
  try {
    const data  = await apiGet('action=events');
    const evts  = data.events || [];
    if (!evts.length) {
      renderPickerEmpty();
      setStatus('No live events yet', '');
    } else {
      renderPicker(evts);
      setStatus(`${evts.length} event${evts.length!==1?'s':''} available`, 'live');
    }
  } catch(e) {
    renderMsg('Cannot reach relay', e.message);
    setStatus('Connection error', 'error');
  }
}

function renderPickerEmpty() {
  app.innerHTML = `
    <div class="picker-wrap">
      <div class="picker-heading">Phoenix Live</div>
      <div class="picker-sub">No events broadcasting at the moment.</div>
      <div class="state-wrap" style="padding-top:20px;">
        <div class="state-desc">Check back soon, or make sure the Phoenix desktop app is running with Cloud Relay enabled.</div>
      </div>
    </div>`;
}

function renderPicker(evts) {
  const now = Date.now();
  const cards = evts.map(ev => {
    const name = esc(ev.eventName || ev.eventId);
    const mods = esc((ev.modules||[]).join(' · '));
    const id   = esc(ev.eventId || '');
    const ts   = ev.lastUpdate ? new Date(ev.lastUpdate).getTime() : 0;
    const ago  = ts ? elapsed(ts) + ' ago' : '–';
    const fresh = ts && (now - ts) < 20000;
    return `<div class="event-card" data-event-id="${id}">
      <div class="event-card-name">${name}${fresh ? '<span class="live-badge">● LIVE</span>' : ''}</div>
      <div class="event-card-meta">${mods} &nbsp;·&nbsp; Updated ${esc(ago)}</div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="picker-wrap">
      <div class="picker-heading">Phoenix Live</div>
      <div class="picker-sub">Tap an event to view live results.</div>
      ${cards}
    </div>`;

  const picker = app.querySelector('.picker-wrap');
  if (picker) {
    picker.addEventListener('click', (e) => {
      const card = e.target.closest('.event-card[data-event-id]');
      if (!card) return;
      const id = card.getAttribute('data-event-id') || '';
      if (!id) return;
      selectEvent(id);
    });
  }
}

function selectEvent(id) {
  clearInterval(pollTimer);
  currentEventId = id;
  pickerMode = false;
  enterEvent(id);
}

// =============================================================================
// Live view
// =============================================================================
function enterEvent(id) {
  setStatus('Connecting…', '');
  poll(id);
  pollTimer = setInterval(() => {
    if (autoRefreshPaused) return;
    poll(id);
  }, POLL_MS);
  statusTimer && clearInterval(statusTimer);
  statusTimer = setInterval(() => {
    if (autoRefreshPaused) {
      setStatus('Paused · tap Resume to continue', '');
      return;
    }
    if (!lastDataChangeTime) return;
    const age = Date.now() - lastDataChangeTime;
    if (age >= STALE_AFTER_MS) {
      setStatus(`Stale · last update ${elapsed(lastDataChangeTime)} ago`, '');
    } else {
      setStatus(`Live · Updated ${elapsed(lastDataChangeTime)} ago`, 'live');
    }
  }, 5000);
}

async function poll(id) {
  try {
    const data  = await apiGet(`action=snapshot&eventId=${encodeURIComponent(id)}`);
    const snaps = data.snapshots || {};
    const mods  = Object.keys(snaps);

    if (!mods.length) {
      renderWaiting(id);
      setStatus('Waiting for data…', '');
      return;
    }

    // Auto-pick module: prefer PT
    if (!currentModule || !snaps[currentModule]) {
      currentModule = mods.includes('pt') ? 'pt' : mods[0];
    }

    lastSnapshotData = snaps;
    lastUpdateTime   = Date.now();

    const snapshotHash = hashSnapshot(snaps);
    if (snapshotHash === lastRenderedSnapshotHash) {
      if (lastDataChangeTime) {
        const age = Date.now() - lastDataChangeTime;
        if (age >= STALE_AFTER_MS) {
          setStatus(`Stale · last update ${elapsed(lastDataChangeTime)} ago`, '');
        } else {
          setStatus(`Live · Updated ${elapsed(lastDataChangeTime)} ago`, 'live');
        }
      }
      return;
    }

    if (userIsInteracting) {
      pendingSnapshotForRender = snaps;
      setStatus('Live · New data queued', 'live');
      return;
    }

    renderLive(snaps);
    lastDataChangeTime = Date.now();
    setStatus('Live · Updated just now', 'live');
  } catch(e) {
    setStatus('Connection error: ' + e.message, 'error');
  }
}

// =============================================================================
// Render live view
// =============================================================================
function renderLive(snaps) {
  const barScrollState = getBarScrollState();
  const contentScrollState = getContentScrollState();
  const mods = Object.keys(snaps);
  const snap = snaps[currentModule] || snaps[mods[0]];
  if (!snap) return;

  const eventName = snap.eventName || currentEventId || 'Phoenix Live';
  const logo      = snap.branding?.logoDataUrl || '';

  // ------- Module tabs -------
  const modLabels = {
    series:    'Series Ranking',
    staging:   'Stage Timing',
    points:    'Stage Points',
    criterium: 'Criterium',
    pt:        'Pump Track',
  };
  const tabs = mods.map(m =>
    `<button class="tab-btn${m===currentModule?' active':''}" data-mod="${esc(m)}">${esc(modLabels[m]||m)}</button>`
  ).join('');

  // ------- PT sub-tabs -------
  const isPt     = currentModule === 'pt';
  const ptV      = isPt ? (snap.views||{}) : {};
  const variants = Array.isArray(ptV.startlistsVariants) ? ptV.startlistsVariants : [];

  // Validate currentPtView
  if (isPt && !ptV[currentPtView] && !['startlists'].includes(currentPtView)) {
    currentPtView = ptV.results ? 'results' : (ptV.startlists ? 'startlists' : 'eventreport');
  }

  let ptSubBar = '';
  if (isPt) {
    const subBtns = [
      { key:'results',     label:'Results',      has:!!ptV.results },
      { key:'startlists',  label:'Start Lists',  has:!!(ptV.startlists||(variants.length>0)) },
      { key:'eventreport', label:'Event Report', has:!!ptV.eventreport },
    ].filter(x=>x.has).map(x =>
      `<button class="pill-btn${x.key===currentPtView?' active':''}" data-ptv="${x.key}">${x.label}</button>`
    ).join('');

    ptSubBar = subBtns ? `<div class="sub-bar" id="ptSubBar">${subBtns}</div>` : '';

    // Start list file picker (only when multiple variants)
    if (currentPtView === 'startlists' && variants.length > 1) {
      const slBtns = variants.map(v => {
        const vid = String(v.id);
        const lbl = esc(v.label || `List ${v.id}`);
        const act = vid === currentPtSlVariantId ? ' active' : '';
        return `<button class="pill-btn${act}" data-slv="${esc(vid)}">${lbl}</button>`;
      }).join('');
      ptSubBar += `<div class="sub-bar" id="slVarBar">${slBtns}</div>`;
    }
  }

  // ------- Get rendered HTML -------
  const html = getHtml(snap, isPt, ptV, variants);

  // ------- Category filter -------
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  const catSections = Array.from(tmp.querySelectorAll('[data-category]'));
  const catNames = [];
  catSections.forEach(s => { const n = s.dataset.category; if(n && !catNames.includes(n)) catNames.push(n); });

  // Auto-pick initial category (prefer 'overall')
  if (!currentCategory || !catNames.includes(currentCategory)) {
    const oi = catNames.findIndex(n => /overall/i.test(n));
    currentCategory = catNames[oi >= 0 ? oi : 0] || '__all__';
  }

  let catBar = '';
  if (catNames.length > 1) {
    const allAct = currentCategory === '__all__' ? ' active' : '';
    const catBtns = catNames.map(c =>
      `<button class="pill-btn${c===currentCategory?' active':''}" data-cat="${esc(c)}">${esc(c)}</button>`
    ).join('');
    catBar = `<div class="cat-bar" id="catBar">
      <button class="pill-btn${allAct}" data-cat="__all__">All</button>
      ${catBtns}
    </div>`;
  }

  // ------- Back button (only when user navigated here from picker) -------
  const backBtn = pickerMode ? '' : `<button class="brand-back" id="backBtn">← Events</button>`;

  // ------- Compose -------
  app.innerHTML = `
    <div class="brand-header">
      <div class="brand-left">
        <div class="brand-kicker">Phoenix Live</div>
        <div class="brand-title">${esc(eventName)}</div>
      </div>
      ${logo ? `<img class="brand-logo" src="${esc(logo)}" alt="Event logo" onerror="this.style.display='none'">` : ''}
      ${backBtn}
    </div>
    <div class="tab-bar" id="tabBar">${tabs}</div>
    ${ptSubBar}
    ${catBar}
    <div class="results-pane" id="rPane"${isPt ? ` data-pt-view="${esc(currentPtView)}"` : ''}>${html||'<div class="state-wrap"><div class="state-desc">No data available.</div></div>'}</div>`;

  applyCategory();
  bindEvents();
  restoreBarScrollState(barScrollState);
  restoreContentScrollState(contentScrollState);
  bindContentInteractionGuards();
  lastRenderedSnapshotHash = hashSnapshot(snaps);
}

// =============================================================================
// Get HTML for current view selection
// =============================================================================
function getHtml(snap, isPt, ptV, variants) {
  if (!snap) return '';
  if (!isPt || !ptV) return snap.html || '';

  if (currentPtView === 'startlists') {
    if (variants.length > 0) {
      // Validate variant selection
      if (!currentPtSlVariantId || !variants.find(v => String(v.id) === currentPtSlVariantId)) {
        currentPtSlVariantId = String(variants[0].id);
        ls('pv_slVariant', currentPtSlVariantId);
      }
      const v = variants.find(v => String(v.id) === currentPtSlVariantId);
      return v?.html || ptV.startlists || snap.html || '';
    }
    return ptV.startlists || snap.html || '';
  }
  if (currentPtView === 'eventreport') return ptV.eventreport || snap.html || '';
  return ptV.results || snap.html || '';
}

// =============================================================================
// Category filtering
// =============================================================================
function applyCategory() {
  const pane = document.getElementById('rPane');
  if (!pane) return;
  const sects = Array.from(pane.querySelectorAll('[data-category]'));
  if (!sects.length) return;

  if (currentCategory === '__all__') {
    sects.forEach(s => s.style.display = '');
    return;
  }
  sects.forEach(s => {
    s.style.display = (s.dataset.category === currentCategory) ? '' : 'none';
  });
}

// =============================================================================
// Event delegation (single listener on app for all interactive elements)
// =============================================================================
function bindEvents() {
  const tabBar   = document.getElementById('tabBar');
  const ptSubBar = document.getElementById('ptSubBar');
  const slVarBar = document.getElementById('slVarBar');
  const catBar   = document.getElementById('catBar');
  const backBtn  = document.getElementById('backBtn');

  if (tabBar) {
    tabBar.addEventListener('click', e => {
      const btn = e.target.closest('[data-mod]');
      if (!btn) return;
      currentModule = btn.dataset.mod;
      if (lastSnapshotData) renderLive(lastSnapshotData);
    });
  }

  if (ptSubBar) {
    ptSubBar.addEventListener('click', e => {
      const btn = e.target.closest('[data-ptv]');
      if (!btn) return;
      currentPtView = btn.dataset.ptv;
      ls('pv_ptView', currentPtView);
      currentPtSlVariantId = '';
      if (lastSnapshotData) renderLive(lastSnapshotData);
    });
  }

  if (slVarBar) {
    slVarBar.addEventListener('click', e => {
      const btn = e.target.closest('[data-slv]');
      if (!btn) return;
      currentPtSlVariantId = btn.dataset.slv;
      ls('pv_slVariant', currentPtSlVariantId);
      if (lastSnapshotData) renderLive(lastSnapshotData);
    });
  }

  if (catBar) {
    catBar.addEventListener('click', e => {
      const btn = e.target.closest('[data-cat]');
      if (!btn) return;
      currentCategory = btn.dataset.cat;
      ls('pv_category', currentCategory);
      // Update button active states
      catBar.querySelectorAll('[data-cat]').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === currentCategory);
      });
      applyCategory();
    });
  }

  if (backBtn) {
    backBtn.addEventListener('click', () => {
      clearInterval(pollTimer);
      clearInterval(statusTimer);
      currentEventId = null;
      currentModule  = null;
      pickerMode     = true;
      openPicker();
    });
  }
}

// =============================================================================
// Fallback states
// =============================================================================
function renderWaiting(id) {
  app.innerHTML = `
    <div class="brand-header">
      <div class="brand-left">
        <div class="brand-kicker">Phoenix Live</div>
        <div class="brand-title">${esc(currentEventId || id)}</div>
      </div>
    </div>
    <div class="state-wrap">
      <div class="state-title">Waiting for data</div>
      <div class="state-desc">The desktop app hasn't published any results yet.<br>Make sure Phoenix is running with Cloud Relay enabled.</div>
    </div>`;
}

function renderMsg(title, detail) {
  app.innerHTML = `
    <div class="state-wrap">
      <div class="state-title">${esc(title)}</div>
      <div class="state-desc">${esc(detail)}</div>
    </div>`;
}

// =============================================================================
// Start
// =============================================================================
init();
</script>
</body>
</html>
